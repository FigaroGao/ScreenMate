<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ScreenMate{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Global Loading Overlay -->
    <div id="global-loading" class="global-loading-overlay" style="display:none;">
        <div class="global-loading-content">
            <div class="spinner-border text-primary" role="status"></div>
            <span class="ms-2 text-light" id="global-loading-text">Processing...</span>
        </div>
    </div>

    <!-- Top Navbar -->
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-3">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-robot fs-4"></i>
                <span class="fw-bold">ScreenMate</span>
                <span class="badge bg-secondary ms-2" id="version-badge">v{{ config.APP_VERSION }}</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-secondary small" id="status-indicator">
                    <span class="status-dot bg-success"></span> Ready
                </span>
                <span class="text-secondary small" id="server-time">--</span>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block sidebar py-3" id="sidebar">
                <ul class="nav flex-column gap-1">
                    <li class="nav-item">
                        <a class="nav-link {% block nav_dashboard %}{% endblock %}" href="/">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% block nav_manual %}{% endblock %}" href="/manual">
                            <i class="bi bi-camera me-2"></i> Manual Mode
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% block nav_auto %}{% endblock %}" href="/auto">
                            <i class="bi bi-arrow-repeat me-2"></i> Auto Mode
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% block nav_settings %}{% endblock %}" href="/settings">
                            <i class="bi bi-gear me-2"></i> Settings
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% block nav_logs %}{% endblock %}" href="/logs">
                            <i class="bi bi-journal-text me-2"></i> Logs
                        </a>
                    </li>
                    <li class="nav-item mt-4">
                        <a class="nav-link {% block nav_about %}{% endblock %}" href="/about">
                            <i class="bi bi-info-circle me-2"></i> About
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-4 py-3" id="main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container" aria-live="polite" aria-atomic="true">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
